# ============================================
# GitHub Actions — Docker Build & Push to ghcr.io
# ============================================
# Builds a single Docker image (Backend + Frontend) and pushes it
# to the GitHub Container Registry (ghcr.io).
#
# Triggers:
#   - Push to main       → Tag: latest
#   - Git tag (v1.0.0)   → Tag: 1.0.0 + latest
#
# Prerequisite:
#   Repository Settings → Actions → General →
#   Enable "Read and write permissions" for GITHUB_TOKEN

name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ---- Checkout repository ----
      - name: Checkout
        uses: actions/checkout@v4

      # ---- QEMU for Multi-Arch (ARM64 for NAS) ----
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ---- Docker Buildx ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Login to ghcr.io ----
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- Lowercase image name ----
      - name: Prepare image name
        id: prep
        run: |
          REPO="${{ github.repository }}"
          echo "image_name=${REPO,,}" >> "$GITHUB_OUTPUT"

      # ---- Generate tags and labels ----
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image_name }}
          tags: |
            # latest on push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # Semver tags: v1.2.3 → 1.2.3, 1.2, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # SHA tag for unique identification
            type=sha,prefix=sha-

      # ---- Build and push image ----
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
