services:
  caddy:
    image: caddy:2-alpine
    container_name: keepomat-caddy
    restart: unless-stopped
    command: sh -c 'printf "{\n\tdefault_sni %s\n}\n\n%s {\n\ttls internal\n\treverse_proxy keepomat:3000\n}\n" "$$CADDY_HOST" "$$CADDY_HOST" > /etc/caddy/Caddyfile && caddy run --config /etc/caddy/Caddyfile'
    ports:
      - "443:443"
    volumes:
      - caddy_data:/data
    environment:
      # Für LAN-Zugriff: CADDY_HOST auf die LAN-IP setzen
      - CADDY_HOST=localhost
    depends_on:
      - keepomat

  keepomat:
    image: ghcr.io/langfeld/keepomat:latest
    container_name: keepomat
    restart: unless-stopped
    # Port nur intern für Caddy – nicht direkt exponiert
    expose:
      - "3000"
    # Ohne Caddy: Zeile oben durch diese ersetzen:
    # ports:
    #   - "8080:3000"
    volumes:
      - ./data:/app/data
    environment:
      # ⚠️ IMPORTANT: Replace with a secure secret!
      # Generate with: openssl rand -base64 48
      - BETTER_AUTH_SECRET=CHANGE_ME_USE_openssl_rand_base64_48
      - BETTER_AUTH_URL=https://localhost
      # Zusätzliche Trusted Origins (kommagetrennt), z.B. Pangolin-Domain:
      # - TRUSTED_ORIGINS=https://bookmarks.example.com
      - MOONSHOT_API_KEY=
      - AI_MODEL=kimi-k2-turbo-preview
      - TELEGRAM_BOT_TOKEN=
      - PUID=1000
      - PGID=1000

volumes:
  caddy_data:
