services:
  caddy:
    image: caddy:2-alpine
    container_name: keepomat-caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # Für HTTPS-LAN-Zugriff: CADDY_HOST auf die LAN-IP setzen
    # environment:
    #   - CADDY_HOST=192.168.1.100
    depends_on:
      - keepomat

  keepomat:
    image: ghcr.io/langfeld/keepomat:latest
    container_name: keepomat
    restart: unless-stopped
    # Port nur intern für Caddy – nicht direkt exponiert
    expose:
      - "3000"
    # Ohne Caddy: Zeile oben durch diese ersetzen:
    # ports:
    #   - "8080:3000"
    volumes:
      - ./data:/app/data
    environment:
      # ⚠️ IMPORTANT: Replace with a secure secret!
      # Generate with: openssl rand -base64 48
      - BETTER_AUTH_SECRET=CHANGE_ME_USE_openssl_rand_base64_48
      - BETTER_AUTH_URL=https://localhost
      # Zusätzliche Trusted Origins (kommagetrennt), z.B. Pangolin-Domain:
      # - TRUSTED_ORIGINS=https://bookmarks.example.com
      - MOONSHOT_API_KEY=
      - AI_MODEL=kimi-k2-turbo-preview
      - TELEGRAM_BOT_TOKEN=
      - PUID=1000
      - PGID=1000

volumes:
  caddy_data:
  caddy_config:
