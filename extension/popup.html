<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a2e; }
    .header { padding: 16px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; display: flex; align-items: center; gap: 10px; }
    .header svg { width: 24px; height: 24px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .content { padding: 16px; }
    .setup { display: none; }
    .setup.active, .main.active { display: block; }
    label { display: block; font-size: 12px; font-weight: 500; color: #666; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; outline: none; background: #f8fafc; }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
    .field { margin-bottom: 12px; }
    .btn { width: 100%; padding: 10px; font-size: 13px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .status { padding: 10px; margin-top: 12px; border-radius: 8px; font-size: 12px; display: none; }
    .status.success { display: block; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .status.error { display: block; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .tag { padding: 2px 8px; background: #eff6ff; color: #3b82f6; border-radius: 6px; font-size: 11px; }
    .footer { padding: 12px 16px; border-top: 1px solid #f1f5f9; font-size: 11px; color: #94a3b8; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
    </svg>
    <h1>Keepomat</h1>
  </div>

  <!-- Setup-Bereich -->
  <div id="setup" class="content setup active">
    <div class="field">
      <label>Server-URL</label>
      <input id="serverUrl" type="url" placeholder="https://keepomat.example.com" />
    </div>
    <div class="field">
      <label>API-Schlüssel</label>
      <input id="apiKey" type="password" placeholder="kpo_..." />
    </div>
    <button id="saveConfig" class="btn btn-primary">Verbinden</button>
    <div id="setupStatus" class="status"></div>
  </div>

  <!-- Hauptbereich -->
  <div id="main" class="content main">
    <div class="field">
      <label>URL</label>
      <input id="url" type="url" readonly />
    </div>
    <div class="field">
      <label>Titel</label>
      <input id="title" type="text" />
    </div>
    <div class="field">
      <label>Tags (kommagetrennt)</label>
      <input id="tags" type="text" placeholder="web, tools" />
    </div>
    <div class="field">
      <label>Ordner</label>
      <select id="folder">
        <option value="">Kein Ordner</option>
      </select>
    </div>
    <button id="saveBookmark" class="btn btn-primary">Speichern</button>
    <div id="mainStatus" class="status"></div>
  </div>

  <div class="footer">
    <a href="#" id="resetLink" style="color: #94a3b8; text-decoration: none;">Einstellungen zurücksetzen</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
